<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — MayaPreneur</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0b1022 0%, #1a2540 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }
        .login-logo {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 32px;
        }
        .login-logo .dot {
            width: 42px; height: 42px;
            background: #ff8c1a;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 900; color: #fff;
        }
        .login-logo div span {
            display: block; font-size: 17px; font-weight: 800; color: #0b1022;
        }
        .login-logo div small {
            font-size: 12px; color: #64748b;
        }
        h2 { font-size: 22px; font-weight: 800; color: #0b1022; margin-bottom: 6px; }
        p.sub { font-size: 13.5px; color: #64748b; margin-bottom: 28px; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: #64748b; margin-bottom: 7px;
        }
        .form-group input {
            width: 100%;
            background: #f8faff;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            padding: 12px 14px;
            font-size: 14px; color: #1e293b;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            border-color: #ff8c1a;
            box-shadow: 0 0 0 3px rgba(255,140,26,0.12);
            background: #fff;
        }
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #ff8a00, #ff6a00);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px; font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.2s;
            box-shadow: 0 6px 18px rgba(255,140,26,0.3);
        }
        .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }
        .error-box {
            background: #fee2e2; color: #991b1b;
            border: 1px solid #fca5a5;
            border-radius: 9px;
            padding: 11px 14px;
            font-size: 13.5px;
            margin-bottom: 18px;
        }
        .back-link {
            display: block; text-align: center;
            margin-top: 18px;
            font-size: 13px; color: #64748b; text-decoration: none;
        }
        .back-link:hover { color: #ff8c1a; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="dot">M</div>
            <div>
                <span>MayaPreneur</span>
                <small>Admin Panel</small>
            </div>
        </div>
        <h2>Welcome Back</h2>
        <p class="sub">Sign in to manage your website content.</p>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="admin@mayapreneur.com" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Sign In →</button>
        </form>
        <a href="{{ url_for('index') }}" class="back-link">← Back to Website</a>
    </div>
</body>
</html>
